<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Sentiment Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>News Sentiment Tracker</h1>
  <p>Average headline sentiment over time, by source</p>

  <canvas id="sentimentChart" width="900" height="400"></canvas>
<h2>Recent Headlines</h2>
<table id="headlineTable">
  <thead>
    <tr>
      <th>Source</th>
      <th>Headline</th>
      <th>Sentiment</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="headlineTableBody"></tbody>
</table>

  <script src="script.js"></script>
</body>
</html>
